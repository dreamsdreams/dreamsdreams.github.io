<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0e0f14;
    --surface: #161820;
    --surface2: #1e2029;
    --border: #2a2d3a;
    --accent: #7c6af7;
    --accent2: #4ecdc4;
    --work: #7c6af7;
    --off: #1e2029;
    --off-text: #4a4d5e;
    --work-text: #fff;
    --text: #e8e9f0;
    --muted: #6b6e82;
    --weekend: #12141a;
    --holiday: #1a1420;
    --holiday-accent: #c084fc;
    --danger: #f87171;
    --success: #4ecdc4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 2rem;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 2.5rem;
  }
  .header-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
  }
  h1 {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #e8e9f0, #7c6af7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
  }

  /* STEP PANELS */
  .step {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.6rem;
    margin-bottom: 1.25rem;
    transition: border-color 0.2s;
  }
  .step.active { border-color: var(--accent); }
  .step.done { border-color: #2a3a2e; }
  .step-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .step-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    flex-shrink: 0;
  }
  .step.done .step-num { background: var(--success); }
  .step-title {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  /* FILE DROP */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 2.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: rgba(124,106,247,0.05);
  }
  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .drop-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
  .drop-label { font-size: 0.9rem; color: var(--muted); }
  .drop-label strong { color: var(--accent); }

  /* ROW SELECTOR */
  .row-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    max-height: 380px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .row-list::-webkit-scrollbar { width: 6px; }
  .row-list::-webkit-scrollbar-track { background: transparent; }
  .row-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .row-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.7rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface2);
  }
  .row-item:hover { border-color: var(--accent); background: rgba(124,106,247,0.06); }
  .row-item.selected { border-color: var(--accent); background: rgba(124,106,247,0.12); }
  .row-item-name { font-weight: 600; font-size: 0.9rem; flex: 1; }
  .row-item-meta { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); }
  .row-item-badge {
    background: rgba(124,106,247,0.2);
    color: var(--accent);
    font-size: 0.68rem;
    font-family: 'DM Mono', monospace;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .search-box {
    width: 100%;
    padding: 0.65rem 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    margin-bottom: 0.75rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  /* CALENDAR */
  .calendar-wrapper { display: none; }
  .calendar-wrapper.visible { display: block; }

  .employee-info {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.2rem;
    background: rgba(124,106,247,0.08);
    border: 1px solid rgba(124,106,247,0.3);
    border-radius: 10px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .emp-name { font-size: 1.05rem; font-weight: 700; }
  .emp-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 3px 8px;
    border-radius: 5px;
    background: rgba(255,255,255,0.07);
    color: var(--muted);
  }

  .cal-legend {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 3px;
  }

  .month-section { margin-bottom: 2rem; }
  .month-title {
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 0.75rem;
    font-family: 'DM Mono', monospace;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal-dow {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    padding: 4px 0;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.12s;
    position: relative;
    user-select: none;
    min-height: 52px;
    padding: 4px;
  }
  .cal-day.empty { background: transparent; cursor: default; }
  .cal-day.weekend {
    background: var(--weekend);
    border-color: rgba(255,255,255,0.04);
  }
  .cal-day.weekday {
    background: var(--off);
    border-color: var(--border);
  }
  .cal-day.work {
    background: linear-gradient(135deg, rgba(124,106,247,0.3), rgba(78,205,196,0.2));
    border-color: var(--accent);
  }
  .cal-day.holiday {
    background: var(--holiday);
    border-color: rgba(192,132,252,0.3);
  }
  .cal-day:not(.empty):hover {
    transform: scale(1.05);
    z-index: 2;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .cal-day.work:hover { border-color: var(--accent2); }
  .cal-day.weekday:hover { border-color: var(--accent); background: rgba(124,106,247,0.1); }

  .day-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--muted);
    line-height: 1;
  }
  .cal-day.work .day-num { color: var(--work-text); font-weight: 700; }
  .day-val {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 500;
    margin-top: 2px;
    color: var(--accent2);
    text-align: center;
    line-height: 1.2;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .cal-day.weekend .day-val { color: var(--muted); }
  .work-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent2);
    margin-top: 2px;
  }
  .holiday-label {
    font-size: 0.55rem;
    color: var(--holiday-accent);
    font-family: 'DM Mono', monospace;
  }

  /* TOOLTIP for day editing */
  .day-popup {
    position: fixed;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 1rem;
    z-index: 1000;
    min-width: 200px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    display: none;
  }
  .day-popup.show { display: block; }
  .popup-title {
    font-size: 0.85rem;
    font-weight: 700;
    margin-bottom: 0.75rem;
    color: var(--accent2);
  }
  .popup-options {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .popup-btn {
    padding: 0.45rem 0.75rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    text-align: left;
    transition: all 0.12s;
  }
  .popup-btn:hover { border-color: var(--accent); background: rgba(124,106,247,0.1); }
  .popup-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
  .popup-custom {
    display: flex;
    gap: 0.4rem;
    margin-top: 0.5rem;
  }
  .popup-input {
    flex: 1;
    padding: 0.4rem 0.6rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    outline: none;
  }
  .popup-input:focus { border-color: var(--accent); }
  .popup-apply {
    padding: 0.4rem 0.75rem;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
  }
  .popup-close {
    position: absolute;
    top: 0.5rem;
    right: 0.75rem;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
  }

  /* SUMMARY BAR */
  .summary-bar {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .summary-stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-label { font-size: 0.68rem; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; }
  .stat-val { font-size: 1.4rem; font-weight: 800; color: var(--accent); }

  /* BUTTONS */
  .btn {
    padding: 0.65rem 1.4rem;
    border-radius: 8px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: -0.01em;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #5b4de0);
    color: #fff;
    box-shadow: 0 4px 16px rgba(124,106,247,0.35);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,106,247,0.5); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); }
  .btn-success {
    background: linear-gradient(135deg, #4ecdc4, #2eb8ae);
    color: #fff;
    box-shadow: 0 4px 16px rgba(78,205,196,0.3);
  }
  .btn-success:hover { transform: translateY(-1px); }

  .action-bar {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }

  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--surface2);
    border: 1px solid var(--success);
    border-radius: 10px;
    padding: 0.85rem 1.25rem;
    font-size: 0.85rem;
    color: var(--success);
    font-family: 'DM Mono', monospace;
    display: none;
    z-index: 9999;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { transform: translateX(120%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }
  
  .hidden { display: none !important; }
  
  /* Responsive */
  @media (max-width: 600px) {
    body { padding: 1rem; }
    .cal-day { min-height: 40px; }
    .day-num { font-size: 0.7rem; }
    .day-val { font-size: 0.55rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📅</div>
  <div>
    <h1>Schedule Editor</h1>
    <div class="subtitle">xlsx → calendar → xlsx</div>
  </div>
</div>

<!-- STEP 1: File Upload -->
<div class="step active" id="step1">
  <div class="step-header">
    <div class="step-num">1</div>
    <div class="step-title">Load Schedule File</div>
  </div>
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".xlsx,.xls" />
    <div class="drop-icon">📂</div>
    <div class="drop-label">Drop your <strong>.xlsx</strong> file here, or click to browse</div>
  </div>
</div>

<!-- STEP 2: Row Select -->
<div class="step" id="step2">
  <div class="step-header">
    <div class="step-num">2</div>
    <div class="step-title">Select Employee Row</div>
  </div>
  <input class="search-box" type="text" id="searchBox" placeholder="Search by name or ID..." />
  <div class="row-list" id="rowList"></div>
</div>

<!-- STEP 3: Calendar Editor -->
<div class="step" id="step3">
  <div class="step-header">
    <div class="step-num">3</div>
    <div class="step-title">Edit Schedule</div>
  </div>
  <div class="calendar-wrapper visible" id="calendarWrapper">
    <div class="employee-info" id="empInfo"></div>

    <div class="summary-bar" id="summaryBar"></div>

    <div class="cal-legend">
      <span class="legend-item"><span class="legend-dot" style="background:var(--accent);"></span> Working</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--off-text);"></span> Off</span>
      <span class="legend-item"><span class="legend-dot" style="background:#2a2d3a;"></span> Weekend</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--holiday-accent);"></span> Holiday/Note</span>
    </div>
    <div class="legend-item" style="font-size:0.75rem;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:1rem;">
      Click any day to set or clear a shift value
    </div>

    <div id="calendarContainer"></div>

    <div class="action-bar">
      <button class="btn btn-success" onclick="saveXlsx()">💾 Save & Download .xlsx</button>
      <button class="btn btn-secondary" onclick="resetAll()">← Load Different File</button>
    </div>
  </div>
</div>

<!-- Popup -->
<div class="day-popup" id="dayPopup">
  <button class="popup-close" onclick="closePopup()">×</button>
  <div class="popup-title" id="popupTitle"></div>
  <div class="popup-options" id="popupOptions"></div>
  <div class="popup-custom">
    <input class="popup-input" id="popupCustom" type="text" placeholder="Custom value..." />
    <button class="popup-apply" onclick="applyCustom()">Set</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let workbook = null;
let wsData = [];      // 2D array of raw cell values
let wsFull = null;    // full worksheet object
let selectedRowIdx = -1;
let colDateMap = [];  // [{col (0-based), month, day, isWeekend, isHolidayCol}]
let editedCells = {}; // col (0-based) -> value
let currentPopupCol = -1;
let allEmployeeRows = [];

// Column ranges for the schedule sheet (0-based):
// Row 8 (index 7) has day numbers; months anchored at col 17 (Apr1), 51 (May1), 87 (Jun1)
const MONTH_STARTS = [
  { col0: 17, month: 3, year: 2026, name: 'April 2026' },   // col 18 in 1-based
  { col0: 51, month: 4, year: 2026, name: 'May 2026' },
  { col0: 87, month: 5, year: 2026, name: 'June 2026' }
];
const DATE_ROW_IDX = 7;  // row 8 (0-based)
const HEADER_ROW_IDX = 8; // row 9 (0-based)
const DATA_START_ROW = 9; // row 10 (0-based)

// ─── File Loading ─────────────────────────────────────────────────────────────
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    workbook = XLSX.read(e.target.result, { type: 'array', cellDates: true });
    const sheetName = workbook.SheetNames.find(n => n.includes('Apr')) || workbook.SheetNames[0];
    wsFull = workbook.Sheets[sheetName];
    wsData = XLSX.utils.sheet_to_json(wsFull, { header: 1, defval: null, raw: false });

    buildColDateMap();
    buildEmployeeList();

    document.getElementById('step1').classList.remove('active');
    document.getElementById('step1').classList.add('done');
    document.getElementById('step2').classList.add('active');
    showToast(`Loaded "${file.name}" · ${allEmployeeRows.length} employees found`);
  };
  reader.readAsArrayBuffer(file);
}

function buildColDateMap() {
  colDateMap = [];
  const dateRow = wsData[DATE_ROW_IDX] || [];

  for (const ms of MONTH_STARTS) {
    const daysInMonth = new Date(ms.year, ms.month + 1, 0).getDate();
    let dayCounter = 1;

    for (let c = ms.col0; c < dateRow.length && dayCounter <= daysInMonth; c++) {
      const v = dateRow[c];
      // Skip weekly summary cols (blank in date row but surrounded by day numbers)
      if (v === null || v === undefined || v === '') continue;
      // Check if it's a holiday col (non-numeric, like "8 Holiday")
      const numVal = parseInt(v);
      if (!isNaN(numVal) && numVal >= 1 && numVal <= 31) {
        const date = new Date(ms.year, ms.month, numVal);
        const dow = date.getDay();
        colDateMap.push({
          col0: c,
          month: ms.month,
          monthName: ms.name,
          day: numVal,
          dow,
          isWeekend: dow === 0 || dow === 6,
          date
        });
        dayCounter = numVal + 1;
      } else if (typeof v === 'string' && v.includes('Holiday')) {
        colDateMap.push({
          col0: c,
          month: ms.month,
          monthName: ms.name,
          day: null,
          dow: null,
          isHolidayMarker: true,
          label: v
        });
      }
    }
  }
}

function buildEmployeeList() {
  allEmployeeRows = [];
  for (let r = DATA_START_ROW; r < wsData.length; r++) {
    const row = wsData[r];
    if (!row) continue;
    const name = row[0];
    const id = row[1];
    const type = row[2];
    if (!name || typeof name !== 'string') continue;
    // Count working days in this row
    let workCount = 0;
    for (const cd of colDateMap) {
      if (cd.isHolidayMarker) continue;
      const v = row[cd.col0];
      if (v !== null && v !== undefined && v !== '' && !String(v).startsWith('=')) workCount++;
    }
    allEmployeeRows.push({ rowIdx: r, name, id, type, workCount });
  }
}

// ─── Employee List ────────────────────────────────────────────────────────────
const searchBox = document.getElementById('searchBox');
const rowList = document.getElementById('rowList');

searchBox.addEventListener('input', renderRowList);

function renderRowList() {
  const q = searchBox.value.trim().toLowerCase();
  rowList.innerHTML = '';
  const filtered = allEmployeeRows.filter(e =>
    !q || e.name.toLowerCase().includes(q) || String(e.id||'').toLowerCase().includes(q)
  );
  if (!filtered.length) {
    rowList.innerHTML = '<div style="color:var(--muted);font-size:0.82rem;padding:1rem;font-family:DM Mono,monospace;">No employees found</div>';
    return;
  }
  filtered.forEach(emp => {
    const div = document.createElement('div');
    div.className = 'row-item' + (emp.rowIdx === selectedRowIdx ? ' selected' : '');
    div.innerHTML = `
      <div class="row-item-name">${emp.name}</div>
      <div class="row-item-meta">${emp.id || ''}</div>
      ${emp.type ? `<span class="row-item-badge">${emp.type}</span>` : ''}
      <div class="row-item-meta">${emp.workCount} days</div>
    `;
    div.addEventListener('click', () => selectEmployee(emp));
    rowList.appendChild(div);
  });
}

function selectEmployee(emp) {
  selectedRowIdx = emp.rowIdx;
  editedCells = {};
  renderRowList();
  buildCalendar(emp);
  document.getElementById('step2').classList.add('done');
  document.getElementById('step3').classList.add('active');
  document.getElementById('step3').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ─── Calendar ────────────────────────────────────────────────────────────────
function buildCalendar(emp) {
  const row = wsData[emp.rowIdx] || [];

  // Employee info
  document.getElementById('empInfo').innerHTML = `
    <div class="emp-name">${emp.name}</div>
    ${emp.id ? `<span class="emp-tag">${emp.id}</span>` : ''}
    ${emp.type ? `<span class="emp-tag">${emp.type}</span>` : ''}
    <span class="emp-tag">Row ${emp.rowIdx + 1}</span>
  `;

  renderSummary(row);
  renderMonths(row);
}

function renderSummary(row) {
  let workDays = 0, totalHours = 0;
  for (const cd of colDateMap) {
    if (cd.isHolidayMarker) continue;
    const v = getEffectiveValue(row, cd.col0);
    if (v !== null && v !== undefined && v !== '' && !String(v).startsWith('=')) {
      workDays++;
      const n = parseFloat(v);
      if (!isNaN(n)) totalHours += n;
    }
  }
  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-stat"><span class="stat-label">Work Days</span><span class="stat-val">${workDays}</span></div>
    <div class="summary-stat"><span class="stat-label">Total Hours</span><span class="stat-val">${totalHours || '—'}</span></div>
  `;
}

function getEffectiveValue(row, col0) {
  return col0 in editedCells ? editedCells[col0] : (row[col0] ?? null);
}

function renderMonths(row) {
  const container = document.getElementById('calendarContainer');
  container.innerHTML = '';

  const months = [...new Set(colDateMap.filter(c=>!c.isHolidayMarker).map(c=>c.monthName))];

  for (const monthName of months) {
    const cols = colDateMap.filter(c => c.monthName === monthName && !c.isHolidayMarker);
    if (!cols.length) continue;

    const firstDay = cols[0].dow; // 0=Sun
    const section = document.createElement('div');
    section.className = 'month-section';
    section.innerHTML = `<div class="month-title">${monthName}</div>`;

    const grid = document.createElement('div');
    grid.className = 'cal-grid';

    // Day of week headers
    ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
      const h = document.createElement('div');
      h.className = 'cal-dow';
      h.textContent = d;
      grid.appendChild(h);
    });

    // Blank cells before first day
    for (let i = 0; i < firstDay; i++) {
      const blank = document.createElement('div');
      blank.className = 'cal-day empty';
      grid.appendChild(blank);
    }

    // Day cells
    for (const cd of cols) {
      const v = getEffectiveValue(row, cd.col0);
      const isWork = v !== null && v !== undefined && v !== '' && !String(v).startsWith('=');

      const cell = document.createElement('div');
      cell.className = 'cal-day ' + (cd.isWeekend ? 'weekend' : (isWork ? 'work' : 'weekday'));
      cell.dataset.col = cd.col0;
      cell.innerHTML = `<span class="day-num">${cd.day}</span>`;
      if (isWork) {
        const display = String(v).trim();
        cell.innerHTML += `<span class="day-val">${display}</span>`;
      }

      cell.addEventListener('click', e => openPopup(e, cd, row));
      grid.appendChild(cell);
    }

    section.appendChild(grid);
    container.appendChild(section);
  }
}

// ─── Popup ────────────────────────────────────────────────────────────────────
const popup = document.getElementById('dayPopup');
const QUICK_OPTS = [
  { label: '12 (12-hr shift)', value: '12' },
  { label: '8 (8-hr shift)', value: '8' },
  { label: 'ADM (Admin)', value: 'ADM' },
  { label: 'OFF', value: 'OFF' },
  { label: 'ooo (Out of office)', value: 'ooo' },
  { label: 'PTO', value: 'PTO' },
  { label: '🗑 Clear', value: null, danger: true }
];

function openPopup(e, cd, row) {
  e.stopPropagation();
  currentPopupCol = cd.col0;
  const v = getEffectiveValue(row, cd.col0);

  document.getElementById('popupTitle').textContent =
    `${cd.date ? cd.date.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) : cd.label}`;
  document.getElementById('popupCustom').value = '';

  const opts = document.getElementById('popupOptions');
  opts.innerHTML = '';
  QUICK_OPTS.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'popup-btn' + (opt.danger ? ' danger' : '');
    btn.textContent = opt.value === v ? `✓ ${opt.label}` : opt.label;
    btn.onclick = () => { applyValue(opt.value); };
    opts.appendChild(btn);
  });

  // Position popup near click
  const rect = e.currentTarget.getBoundingClientRect();
  let left = rect.right + 8;
  let top = rect.top;
  if (left + 220 > window.innerWidth) left = rect.left - 228;
  if (top + 300 > window.innerHeight) top = window.innerHeight - 310;
  popup.style.left = left + 'px';
  popup.style.top = Math.max(8, top) + 'px';
  popup.classList.add('show');
}

document.addEventListener('click', e => {
  if (!popup.contains(e.target)) closePopup();
});

function closePopup() {
  popup.classList.remove('show');
  currentPopupCol = -1;
}

function applyValue(val) {
  if (currentPopupCol < 0) return;
  editedCells[currentPopupCol] = val;
  closePopup();
  const emp = allEmployeeRows.find(e => e.rowIdx === selectedRowIdx);
  if (emp) {
    const row = wsData[emp.rowIdx] || [];
    renderMonths(row);
    renderSummary(row);
  }
}

function applyCustom() {
  const val = document.getElementById('popupCustom').value.trim() || null;
  applyValue(val);
}

// ─── Save ────────────────────────────────────────────────────────────────────
function saveXlsx() {
  if (!workbook || selectedRowIdx < 0) return;

  const sheetName = workbook.SheetNames.find(n => n.includes('Apr')) || workbook.SheetNames[0];
  const ws = workbook.Sheets[sheetName];

  // Apply edits to the workbook cells (1-based)
  for (const [col0str, val] of Object.entries(editedCells)) {
    const col0 = parseInt(col0str);
    const colNum = col0 + 1; // 1-based
    const rowNum = selectedRowIdx + 1; // 1-based
    const cellAddr = XLSX.utils.encode_cell({ r: selectedRowIdx, c: col0 });

    if (val === null) {
      // Delete cell
      delete ws[cellAddr];
    } else {
      const numVal = parseFloat(val);
      ws[cellAddr] = isNaN(numVal)
        ? { t: 's', v: val }
        : { t: 'n', v: numVal };
    }
  }

  // Also update the in-memory wsData for consistency
  const row = wsData[selectedRowIdx] || [];
  for (const [col0str, val] of Object.entries(editedCells)) {
    row[parseInt(col0str)] = val;
  }

  const wbOut = XLSX.write(workbook, { bookType: 'xlsx', type: 'array' });
  const blob = new Blob([wbOut], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Updated_Schedule.xlsx';
  a.click();
  URL.revokeObjectURL(url);

  // Update the employee's workCount
  const emp = allEmployeeRows.find(e => e.rowIdx === selectedRowIdx);
  if (emp) {
    let wc = 0;
    for (const cd of colDateMap) {
      if (cd.isHolidayMarker) continue;
      const v = getEffectiveValue(wsData[selectedRowIdx]||[], cd.col0);
      if (v !== null && v !== undefined && v !== '' && !String(v).startsWith('=')) wc++;
    }
    emp.workCount = wc;
  }

  editedCells = {};
  showToast('✓ Saved & downloaded Updated_Schedule.xlsx');
}

function resetAll() {
  workbook = null; wsData = []; wsFull = null;
  selectedRowIdx = -1; colDateMap = []; editedCells = {};
  allEmployeeRows = [];
  document.getElementById('step1').classList.add('active');
  document.getElementById('step1').classList.remove('done');
  document.getElementById('step2').classList.remove('active','done');
  document.getElementById('step3').classList.remove('active','done');
  document.getElementById('rowList').innerHTML = '';
  document.getElementById('calendarContainer').innerHTML = '';
  document.getElementById('empInfo').innerHTML = '';
  document.getElementById('summaryBar').innerHTML = '';
  fileInput.value = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3500);
}

// Kick off row list render (empty initially)
renderRowList();
</script>
