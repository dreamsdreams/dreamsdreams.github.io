<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel Column J Extractor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f3;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      border: 0.5px solid rgba(0,0,0,0.12);
      padding: 2rem;
      width: 100%;
      max-width: 600px;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 0.25rem;
      color: #1a1a18;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 1.5rem;
    }

    #drop-zone {
      border: 1.5px dashed #bbb;
      border-radius: 12px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    #drop-zone:hover, #drop-zone.dragover {
      background: #f5f5f3;
      border-color: #888;
    }

    .drop-icon {
      font-size: 32px;
      margin-bottom: 0.5rem;
      line-height: 1;
    }

    .drop-title {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .drop-hint {
      font-size: 13px;
      color: #888;
    }

    #result-area {
      display: none;
      margin-top: 1.5rem;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 0.75rem;
    }

    .result-title {
      font-size: 14px;
      font-weight: 500;
    }

    .result-count {
      font-size: 13px;
      color: #888;
      margin-left: 8px;
    }

    .btn-group {
      display: flex;
      gap: 8px;
    }

    button {
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.2);
      background: transparent;
      color: #1a1a18;
      cursor: pointer;
      transition: background 0.12s;
      font-family: inherit;
    }

    button:hover { background: #f0f0ee; }
    button:active { transform: scale(0.98); }

    #list-container {
      background: #f9f9f7;
      border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.1);
      max-height: 420px;
      overflow-y: auto;
    }

    .list-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 14px;
      border-bottom: 0.5px solid rgba(0,0,0,0.07);
    }

    .list-row:last-child { border-bottom: none; }

    .row-ref {
      font-size: 12px;
      color: #999;
      min-width: 32px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .row-value {
      font-size: 14px;
      color: #1a1a18;
      word-break: break-all;
    }

    .empty-msg {
      padding: 1rem;
      font-size: 13px;
      color: #888;
      text-align: center;
    }

    #error-msg {
      display: none;
      color: #a32d2d;
      font-size: 13px;
      margin-top: 0.75rem;
      padding: 10px 14px;
      background: #fcebeb;
      border-radius: 8px;
    }

    .reset-btn {
      display: none;
      margin-top: 1rem;
      width: 100%;
      text-align: center;
      font-size: 13px;
      padding: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Excel Column J Extractor</h1>
    <p class="subtitle">Reads all values in column J starting from row 2, stopping at the first empty cell.</p>

    <div id="drop-zone"
      onclick="document.getElementById('file-input').click()"
      ondragover="event.preventDefault();this.classList.add('dragover')"
      ondragleave="this.classList.remove('dragover')"
      ondrop="handleDrop(event)">
      <div class="drop-icon">📄</div>
      <p class="drop-title">Drop your Excel or CSV file here</p>
      <p class="drop-hint">or click to browse — .xlsx, .xls, .csv supported</p>
      <input type="file" id="file-input" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFile(this.files[0])">
    </div>

    <div id="error-msg"></div>

    <div id="result-area">
      <div class="result-header">
        <div>
          <span class="result-title" id="result-title">Column J values</span>
          <span class="result-count" id="result-count"></span>
        </div>
        <div class="btn-group">
          <button onclick="copyList(this)">Copy list</button>
          <button onclick="downloadTxt()">Download .txt</button>
        </div>
      </div>
      <div id="list-container"></div>
    </div>

    <button class="reset-btn" id="reset-btn" onclick="resetTool()">Upload another file</button>
  </div>

  <script>
    let extractedValues = [];

    function handleDrop(e) {
      e.preventDefault();
      document.getElementById('drop-zone').classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    }

    function handleFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = new Uint8Array(e.target.result);
          const wb = XLSX.read(data, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const range = XLSX.utils.decode_range(ws['!ref'] || 'A1');
          const colJ = 9;
          const values = [];

          for (let row = 1; row <= range.e.r; row++) {
            const cellAddr = XLSX.utils.encode_cell({ r: row, c: colJ });
            const cell = ws[cellAddr];
            if (!cell || cell.v === undefined || cell.v === null || cell.v === '') break;
            values.push(cell.v);
          }

          extractedValues = values;
          showResults(file.name, values);
          document.getElementById('error-msg').style.display = 'none';
        } catch(err) {
          showError('Could not read file. Make sure it\'s a valid Excel or CSV file.');
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function showResults(filename, values) {
      document.getElementById('result-title').textContent = 'Column J — ' + filename;
      document.getElementById('result-count').textContent = values.length + ' value' + (values.length !== 1 ? 's' : '') + ' found';

      const container = document.getElementById('list-container');
      if (values.length === 0) {
        container.innerHTML = '<p class="empty-msg">No values found in column J starting from row 2.</p>';
      } else {
        container.innerHTML = values.map(function(v, i) {
          return '<div class="list-row"><span class="row-ref">J' + (i + 2) + '</span><span class="row-value">' + escapeHtml(String(v)) + ',</span></div>';
        }).join('');
      }

      document.getElementById('result-area').style.display = 'block';
      document.getElementById('reset-btn').style.display = 'block';
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('result-area').style.display = 'none';
    }

    function copyList(btn) {
      const text = extractedValues.map(function(v) { return v + ','; }).join('\n');
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = 'Copied!';
        setTimeout(function() { btn.textContent = 'Copy list'; }, 1500);
      });
    }

    function resetTool() {
      extractedValues = [];
      document.getElementById('result-area').style.display = 'none';
      document.getElementById('reset-btn').style.display = 'none';
      document.getElementById('error-msg').style.display = 'none';
      document.getElementById('file-input').value = '';
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
