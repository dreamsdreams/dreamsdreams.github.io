<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Room</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e8e0d0;
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #canvas-container {
    position: fixed;
    inset: 0;
    cursor: grab;
  }
  #canvas-container:active { cursor: grabbing; }

  canvas { display: block; }

  /* UI Panel */
  #ui-panel {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 12px;
    pointer-events: none;
  }

  .panel-card {
    background: rgba(10,10,15,0.85);
    border: 1px solid rgba(232,224,208,0.15);
    border-radius: 4px;
    padding: 14px 16px;
    pointer-events: all;
    backdrop-filter: blur(12px);
  }

  .panel-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    letter-spacing: 0.02em;
    color: #e8e0d0;
    margin-bottom: 4px;
  }

  .panel-sub {
    font-size: 10px;
    color: rgba(232,224,208,0.4);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .upload-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(232,224,208,0.08);
    border: 1px dashed rgba(232,224,208,0.3);
    border-radius: 3px;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: rgba(232,224,208,0.7);
    width: 100%;
    text-align: left;
  }

  .upload-btn:hover {
    background: rgba(232,224,208,0.14);
    border-color: rgba(232,224,208,0.5);
    color: #e8e0d0;
  }

  .upload-btn svg { flex-shrink: 0; }

  #file-input { display: none; }

  /* Object list */
  #objects-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 200px;
    overflow-y: auto;
  }

  .obj-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    background: rgba(232,224,208,0.05);
    border: 1px solid rgba(232,224,208,0.1);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 10px;
    color: rgba(232,224,208,0.6);
    user-select: none;
  }

  .obj-item:hover, .obj-item.active {
    background: rgba(232,224,208,0.12);
    border-color: rgba(232,224,208,0.3);
    color: #e8e0d0;
  }

  .obj-thumb {
    width: 28px;
    height: 28px;
    border-radius: 2px;
    object-fit: cover;
    border: 1px solid rgba(232,224,208,0.15);
  }

  .obj-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .obj-del {
    width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: rgba(255,80,80,0.12);
    color: rgba(255,120,120,0.6);
    font-size: 11px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .obj-del:hover { background: rgba(255,80,80,0.3); color: #ff8888; }

  /* Controls hint */
  #controls-hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    z-index: 100;
  }

  .hint-chip {
    background: rgba(10,10,15,0.8);
    border: 1px solid rgba(232,224,208,0.1);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 10px;
    color: rgba(232,224,208,0.4);
    letter-spacing: 0.06em;
    backdrop-filter: blur(8px);
    white-space: nowrap;
  }

  .hint-chip span { color: rgba(232,224,208,0.7); }

  /* Right panel for selected object controls */
  #obj-controls {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    width: 200px;
    display: none;
  }

  .ctrl-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .ctrl-label { font-size: 10px; color: rgba(232,224,208,0.5); letter-spacing: 0.06em; }

  .ctrl-val {
    font-size: 11px;
    color: rgba(232,224,208,0.8);
    min-width: 36px;
    text-align: right;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 2px;
    background: rgba(232,224,208,0.15);
    border-radius: 1px;
    outline: none;
    margin-bottom: 10px;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #e8e0d0;
    cursor: pointer;
  }

  .deselect-btn {
    width: 100%;
    padding: 8px;
    background: rgba(232,224,208,0.06);
    border: 1px solid rgba(232,224,208,0.15);
    border-radius: 3px;
    color: rgba(232,224,208,0.5);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    margin-top: 4px;
    letter-spacing: 0.06em;
    transition: all 0.15s;
  }
  .deselect-btn:hover { background: rgba(232,224,208,0.12); color: #e8e0d0; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(232,224,208,0.95);
    color: #0a0a0f;
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 11px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 200;
    letter-spacing: 0.05em;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Mode indicator */
  #mode-badge {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(180,140,80,0.2);
    border: 1px solid rgba(180,140,80,0.4);
    color: rgba(220,180,100,0.9);
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: none;
    z-index: 100;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<!-- Left panel -->
<div id="ui-panel">
  <div class="panel-card">
    <div class="panel-title">Room Studio</div>
    <div class="panel-sub">3D Scene Editor</div>
    <label class="upload-btn" for="file-input">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Upload image → place in room
    </label>
    <input type="file" id="file-input" accept="image/*">
  </div>

  <div class="panel-card" id="objects-panel" style="display:none;">
    <div class="panel-sub" style="margin-bottom:8px;">Placed Objects</div>
    <div id="objects-list"></div>
  </div>
</div>

<!-- Right panel: selected object controls -->
<div id="obj-controls">
  <div class="panel-card">
    <div class="panel-sub" style="margin-bottom:10px;">Selected Object</div>

    <div class="ctrl-row">
      <span class="ctrl-label">SCALE</span>
      <span class="ctrl-val" id="val-scale">1.0</span>
    </div>
    <input type="range" id="ctrl-scale" min="0.1" max="5" step="0.05" value="1">

    <div class="ctrl-row">
      <span class="ctrl-label">ROTATE Y</span>
      <span class="ctrl-val" id="val-rotY">0°</span>
    </div>
    <input type="range" id="ctrl-rotY" min="-180" max="180" step="1" value="0">

    <div class="ctrl-row">
      <span class="ctrl-label">HEIGHT</span>
      <span class="ctrl-val" id="val-posY">0.0</span>
    </div>
    <input type="range" id="ctrl-posY" min="0" max="4" step="0.05" value="0">

    <button class="deselect-btn" id="done-btn">✓ Done Placing</button>
  </div>
</div>

<div id="mode-badge">Placement Mode — Click Floor to Place</div>

<!-- Controls hint -->
<div id="controls-hint">
  <div class="hint-chip"><span>Drag</span> to orbit</div>
  <div class="hint-chip"><span>Scroll</span> to zoom</div>
  <div class="hint-chip"><span>Right-drag</span> to pan</div>
  <div class="hint-chip"><span>Click object</span> to select</div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── Scene Setup ───────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0e0d12);
scene.fog = new THREE.Fog(0x0e0d12, 20, 40);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 3, 8);
camera.lookAt(0, 1.5, 0);

// ─── Lighting ──────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0xfff5e0, 0.4);
scene.add(ambient);

const ceiling_light = new THREE.PointLight(0xfff0d0, 1.8, 18);
ceiling_light.position.set(0, 4.8, 0);
ceiling_light.castShadow = true;
ceiling_light.shadow.mapSize.width = 1024;
ceiling_light.shadow.mapSize.height = 1024;
scene.add(ceiling_light);

// Subtle rim lights
const rimL = new THREE.PointLight(0x6080ff, 0.3, 12);
rimL.position.set(-5, 2, -4);
scene.add(rimL);
const rimR = new THREE.PointLight(0xff8040, 0.2, 12);
rimR.position.set(5, 2, -4);
scene.add(rimR);

// Light bulb visible
const bulbGeo = new THREE.SphereGeometry(0.08, 8, 8);
const bulbMat = new THREE.MeshStandardMaterial({ color: 0xfffbe0, emissive: 0xfffbe0, emissiveIntensity: 3 });
const bulb = new THREE.Mesh(bulbGeo, bulbMat);
bulb.position.copy(ceiling_light.position);
scene.add(bulb);

// Pendant wire
const wireGeo = new THREE.CylinderGeometry(0.005, 0.005, 0.4, 6);
const wireMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
const wire = new THREE.Mesh(wireGeo, wireMat);
wire.position.set(0, 5.15, 0);
scene.add(wire);

// ─── Room Geometry ─────────────────────────────────────────────
const ROOM_W = 12, ROOM_H = 5.5, ROOM_D = 12;

function makeMaterial(color, roughness = 0.85, metalness = 0) {
  return new THREE.MeshStandardMaterial({ color, roughness, metalness, side: THREE.BackSide });
}

// Floor
const floorGeo = new THREE.PlaneGeometry(ROOM_W, ROOM_D, 20, 20);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x2a1f14,
  roughness: 0.4,
  metalness: 0.05,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
floor.name = 'floor';
scene.add(floor);

// Floor planks via grid
const gridHelper = new THREE.GridHelper(ROOM_W, 12, 0x4a3020, 0x3a2518);
gridHelper.position.y = 0.001;
scene.add(gridHelper);

// Room shell (walls + ceiling via BackSide box)
const roomGeo = new THREE.BoxGeometry(ROOM_W, ROOM_H, ROOM_D);
const wallMat = new THREE.MeshStandardMaterial({ color: 0xddd5c0, roughness: 0.9, side: THREE.BackSide });
const ceilMat = new THREE.MeshStandardMaterial({ color: 0xe8e0d0, roughness: 0.95, side: THREE.BackSide });

// Use groups to have different materials per face
const mats = [wallMat, wallMat, ceilMat, floorMat, wallMat, wallMat];
const room = new THREE.Mesh(roomGeo, mats);
room.position.y = ROOM_H / 2;
room.receiveShadow = true;
scene.add(room);

// Baseboard trim
function addBaseboard(w, d, px, pz, ry) {
  const geo = new THREE.BoxGeometry(w, 0.12, 0.06);
  const mat = new THREE.MeshStandardMaterial({ color: 0xf0ece0, roughness: 0.5 });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(px, 0.06, pz);
  m.rotation.y = ry;
  scene.add(m);
}
addBaseboard(ROOM_W, 0, 0, -ROOM_D/2+0.03, 0);
addBaseboard(ROOM_W, 0, 0, ROOM_D/2-0.03, 0);
addBaseboard(ROOM_D, 0, -ROOM_W/2+0.03, 0, Math.PI/2);
addBaseboard(ROOM_D, 0, ROOM_W/2-0.03, 0, Math.PI/2);

// Crown molding
function addCrown(w, px, pz, ry) {
  const geo = new THREE.BoxGeometry(w, 0.1, 0.08);
  const mat = new THREE.MeshStandardMaterial({ color: 0xf8f4ee, roughness: 0.4 });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(px, ROOM_H - 0.05, pz);
  m.rotation.y = ry;
  scene.add(m);
}
addCrown(ROOM_W, 0, -ROOM_D/2+0.04, 0);
addCrown(ROOM_W, 0, ROOM_D/2-0.04, 0);
addCrown(ROOM_D, -ROOM_W/2+0.04, 0, Math.PI/2);
addCrown(ROOM_D, ROOM_W/2-0.04, 0, Math.PI/2);

// Window on back wall
function makeWindow(x, y, z) {
  const frameGeo = new THREE.BoxGeometry(1.8, 2.2, 0.1);
  const frameMat = new THREE.MeshStandardMaterial({ color: 0xf0ece0, roughness: 0.3 });
  const frame = new THREE.Mesh(frameGeo, frameMat);
  frame.position.set(x, y, z);
  scene.add(frame);

  const glassGeo = new THREE.PlaneGeometry(1.5, 1.9);
  const glassMat = new THREE.MeshStandardMaterial({
    color: 0x88aacc, transparent: true, opacity: 0.18,
    roughness: 0.05, metalness: 0.1, side: THREE.DoubleSide
  });
  const glass = new THREE.Mesh(glassGeo, glassMat);
  glass.position.set(x, y, z + 0.01);
  scene.add(glass);

  // Window light glow
  const wLight = new THREE.RectAreaLight(0xbbd8ff, 1.5, 1.5, 1.9);
  wLight.position.set(x, y, z + 0.2);
  wLight.lookAt(x, y, z + 2);
  scene.add(wLight);
}
makeWindow(-2, 2.5, -ROOM_D/2 + 0.15);
makeWindow(2, 2.5, -ROOM_D/2 + 0.15);

// ─── Placed Objects ────────────────────────────────────────────
const placedObjects = [];
let selectedObj = null;
let placingObj = null;

// Raycaster for floor click placement
const raycaster = new THREE.Raycaster();
const mouse2D = new THREE.Vector2();
const floorPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

// ─── Camera Orbit Controls ─────────────────────────────────────
let isOrbiting = false, isPanning = false;
let prevMouse = { x: 0, y: 0 };
let spherical = { theta: 0, phi: Math.PI / 3.5, radius: 10 };
let target = new THREE.Vector3(0, 1.5, 0);

function updateCamera() {
  const x = target.x + spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  const y = target.y + spherical.radius * Math.cos(spherical.phi);
  const z = target.z + spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.position.set(x, y, z);
  camera.lookAt(target);
}
updateCamera();

container.addEventListener('mousedown', e => {
  if (e.button === 0) {
    if (placingObj) {
      // Place object on click
      handleFloorClick(e);
      return;
    }
    isOrbiting = true;
  }
  if (e.button === 2) isPanning = true;
  prevMouse = { x: e.clientX, y: e.clientY };
});

container.addEventListener('contextmenu', e => e.preventDefault());

window.addEventListener('mouseup', e => {
  isOrbiting = false;
  isPanning = false;
});

window.addEventListener('mousemove', e => {
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;

  if (isOrbiting && !placingObj) {
    spherical.theta -= dx * 0.005;
    spherical.phi = Math.max(0.1, Math.min(Math.PI / 2.2, spherical.phi + dy * 0.005));
    updateCamera();
  }
  if (isPanning) {
    const panSpeed = 0.01;
    const right = new THREE.Vector3();
    camera.getWorldDirection(right);
    right.crossVectors(camera.up, right.normalize()).normalize();
    target.addScaledVector(right, dx * panSpeed * spherical.radius * 0.1);
    target.y -= dy * panSpeed * spherical.radius * 0.1;
    target.y = Math.max(0.1, Math.min(ROOM_H - 0.5, target.y));
    updateCamera();
  }

  // Move placing object along floor
  if (placingObj) {
    mouse2D.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse2D.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse2D, camera);
    const pt = new THREE.Vector3();
    raycaster.ray.intersectPlane(floorPlane, pt);
    if (pt) {
      const half = ROOM_W / 2 - 0.5;
      pt.x = Math.max(-half, Math.min(half, pt.x));
      pt.z = Math.max(-ROOM_D/2 + 0.5, Math.min(ROOM_D/2 - 0.5, pt.z));
      placingObj.mesh.position.x = pt.x;
      placingObj.mesh.position.z = pt.z;
    }
  }

  prevMouse = { x: e.clientX, y: e.clientY };
});

container.addEventListener('wheel', e => {
  spherical.radius = Math.max(2, Math.min(18, spherical.radius + e.deltaY * 0.01));
  updateCamera();
});

// Click to select existing objects
container.addEventListener('click', e => {
  if (placingObj) return;
  mouse2D.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse2D.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse2D, camera);

  const meshes = placedObjects.map(o => o.mesh);
  const hits = raycaster.intersectObjects(meshes, true);
  if (hits.length > 0) {
    let hit = hits[0].object;
    while (hit.parent && !placedObjects.find(o => o.mesh === hit)) hit = hit.parent;
    const found = placedObjects.find(o => o.mesh === hit || o.mesh.children.includes(hit));
    if (found) selectObject(found);
  } else {
    deselectObject();
  }
});

function handleFloorClick(e) {
  mouse2D.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse2D.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse2D, camera);
  const pt = new THREE.Vector3();
  raycaster.ray.intersectPlane(floorPlane, pt);
  if (pt) {
    const half = ROOM_W / 2 - 0.5;
    pt.x = Math.max(-half, Math.min(half, pt.x));
    pt.z = Math.max(-ROOM_D/2 + 0.5, Math.min(ROOM_D/2 - 0.5, pt.z));
    placingObj.mesh.position.set(pt.x, placingObj.mesh.position.y, pt.z);
    confirmPlacement();
  }
}

// ─── Image → 3D Model ──────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';

  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => createModelFromImage(img, file.name);
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

function createModelFromImage(img, filename) {
  // Create texture
  const texture = new THREE.TextureLoader().load(img.src);
  texture.encoding = THREE.sRGBEncoding;

  const aspect = img.width / img.height;
  const h = 1.8; // default height
  const w = h * aspect;

  // Create a billboard plane (double-sided with the image)
  const geo = new THREE.PlaneGeometry(w, h);
  const mat = new THREE.MeshStandardMaterial({
    map: texture,
    transparent: true,
    alphaTest: 0.05,
    side: THREE.DoubleSide,
    roughness: 0.6,
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(0, h / 2, 0);
  mesh.castShadow = true;
  mesh.receiveShadow = true;

  // Add a subtle shadow plane beneath
  const shadowGeo = new THREE.EllipseGeometry(w * 0.4, 0.15, 16);
  const shadowMat = new THREE.MeshStandardMaterial({
    color: 0x000000, transparent: true, opacity: 0.25, roughness: 1,
  });
  const shadow = new THREE.Mesh(shadowGeo, shadowMat);
  shadow.rotation.x = -Math.PI / 2;
  shadow.position.y = -h / 2 + 0.001;
  mesh.add(shadow);

  scene.add(mesh);

  const name = filename.replace(/\.[^/.]+$/, '').substring(0, 18);
  const objData = {
    mesh, name, thumb: img.src,
    scale: 1, rotY: 0, posY: 0,
    baseH: h / 2
  };
  placedObjects.push(objData);

  // Enter placement mode
  placingObj = objData;
  document.getElementById('mode-badge').style.display = 'block';
  showToast('Move mouse to position · Click to place');
  updateObjectsList();
}

function confirmPlacement() {
  placingObj = null;
  document.getElementById('mode-badge').style.display = 'none';
  const last = placedObjects[placedObjects.length - 1];
  selectObject(last);
  showToast('Placed! Adjust with controls →');
}

// ─── Selection & Controls ──────────────────────────────────────
function selectObject(obj) {
  selectedObj = obj;
  document.getElementById('obj-controls').style.display = 'block';

  document.getElementById('ctrl-scale').value = obj.scale;
  document.getElementById('val-scale').textContent = obj.scale.toFixed(2);
  document.getElementById('ctrl-rotY').value = obj.rotY;
  document.getElementById('val-rotY').textContent = Math.round(obj.rotY) + '°';
  document.getElementById('ctrl-posY').value = obj.posY;
  document.getElementById('val-posY').textContent = obj.posY.toFixed(2);

  updateObjectsList();
}

function deselectObject() {
  selectedObj = null;
  document.getElementById('obj-controls').style.display = 'none';
  updateObjectsList();
}

document.getElementById('ctrl-scale').addEventListener('input', function() {
  if (!selectedObj) return;
  selectedObj.scale = parseFloat(this.value);
  selectedObj.mesh.scale.setScalar(selectedObj.scale);
  document.getElementById('val-scale').textContent = selectedObj.scale.toFixed(2);
});

document.getElementById('ctrl-rotY').addEventListener('input', function() {
  if (!selectedObj) return;
  selectedObj.rotY = parseFloat(this.value);
  selectedObj.mesh.rotation.y = selectedObj.rotY * Math.PI / 180;
  document.getElementById('val-rotY').textContent = Math.round(selectedObj.rotY) + '°';
});

document.getElementById('ctrl-posY').addEventListener('input', function() {
  if (!selectedObj) return;
  selectedObj.posY = parseFloat(this.value);
  selectedObj.mesh.position.y = selectedObj.baseH * selectedObj.scale + selectedObj.posY;
  document.getElementById('val-posY').textContent = selectedObj.posY.toFixed(2);
});

document.getElementById('done-btn').addEventListener('click', deselectObject);

// ─── Objects List UI ───────────────────────────────────────────
function updateObjectsList() {
  const panel = document.getElementById('objects-panel');
  const list = document.getElementById('objects-list');
  list.innerHTML = '';

  if (placedObjects.length === 0) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';

  placedObjects.forEach((obj, i) => {
    const item = document.createElement('div');
    item.className = 'obj-item' + (selectedObj === obj ? ' active' : '');
    item.innerHTML = `
      <img class="obj-thumb" src="${obj.thumb}">
      <span class="obj-name">${obj.name}</span>
      <div class="obj-del" data-i="${i}">✕</div>
    `;
    item.addEventListener('click', ev => {
      if (ev.target.classList.contains('obj-del')) {
        const idx = parseInt(ev.target.dataset.i);
        removeObject(idx);
      } else {
        selectObject(obj);
      }
    });
    list.appendChild(item);
  });
}

function removeObject(idx) {
  const obj = placedObjects[idx];
  scene.remove(obj.mesh);
  placedObjects.splice(idx, 1);
  if (selectedObj === obj) deselectObject();
  updateObjectsList();
}

// ─── Toast ─────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── Resize ────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Render Loop ───────────────────────────────────────────────
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.01;

  // Subtle light flicker
  ceiling_light.intensity = 1.8 + Math.sin(t * 0.7) * 0.04;

  // Animate placed objects slightly in placement mode
  if (placingObj) {
    placingObj.mesh.rotation.y = Math.sin(t * 1.2) * 0.08;
  }

  renderer.render(scene, camera);
}
animate();

showToast('Upload an image to place it in the room');
</script>
</body>
