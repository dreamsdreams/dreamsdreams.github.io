<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSV Formatter</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Calibri, Arial, sans-serif;
    background: #f0f0ee;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1.5rem;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 0.25rem;
  }
  .subtitle {
    font-size: 13px;
    color: #666;
    margin-bottom: 2rem;
  }
  .card {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
    max-width: 1300px;
  }
  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 1rem;
  }
  .upload-area {
    border: 2px dashed #ccc;
    border-radius: 8px;
    padding: 2.5rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .upload-area:hover, .upload-area.drag-over {
    border-color: #3a3a3a;
    background: #f7f7f7;
  }
  .upload-area input { display: none; }
  .upload-icon { font-size: 28px; margin-bottom: 0.5rem; color: #999; }
  .upload-text { font-size: 15px; color: #555; }
  .upload-text strong { color: #1a1a1a; font-weight: 600; }
  .upload-hint { font-size: 12px; color: #aaa; margin-top: 0.4rem; }
  .file-chosen { font-size: 13px; color: #3a3a3a; margin-top: 0.75rem; font-weight: 500; }
  .badge {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 12px;
    border-radius: 20px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .badge-vpt    { background: #dceeff; color: #1a5fa8; }
  .badge-person { background: #d8f5e9; color: #1a7a46; }
  .badge-unk    { background: #fff3cd; color: #856404; }
  .page-type-row { font-size: 14px; margin-top: 0.75rem; display: none; }
  .filter-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .filter-row label { font-size: 14px; color: #555; font-weight: 500; }
  select {
    padding: 7px 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 13px;
    background: #fff;
    color: #1a1a1a;
    min-width: 220px;
    cursor: pointer;
  }
  select:focus { outline: 2px solid #3a3a3a; outline-offset: 1px; }
  .btn {
    padding: 8px 18px;
    border-radius: 6px;
    border: 1px solid #bbb;
    background: #fff;
    color: #1a1a1a;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    font-family: inherit;
  }
  .btn:hover { background: #f2f2f2; border-color: #999; }
  .btn-dark {
    background: #3a3a3a;
    color: #fff;
    border-color: #3a3a3a;
  }
  .btn-dark:hover { background: #555; border-color: #555; }
  .actions-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 1rem; }
  .row-count { font-size: 13px; color: #888; }
  .error { color: #c0392b; font-size: 13px; margin-top: 0.6rem; font-weight: 500; }
  .table-wrap { overflow-x: auto; }
  table.dt {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
    font-family: Calibri, Arial, sans-serif;
  }
  table.dt thead tr { background: #3a3a3a; color: #fff; }
  table.dt thead th {
    padding: 9px 11px;
    text-align: center;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.02em;
    border: 1px solid #555;
    white-space: nowrap;
  }
  table.dt tbody tr:nth-child(odd)  { background: #ffffff; }
  table.dt tbody tr:nth-child(even) { background: #f2f2f2; }
  table.dt td {
    padding: 7px 10px;
    text-align: center;
    border: 1px solid #d0d0d0;
    vertical-align: middle;
  }
  #filter-card, #output-card { display: none; }
  .status-note { font-size: 13px; color: #666; margin-top: 0.5rem; }
</style>
</head>
<body>

<h1>TSV Formatter</h1>
<p class="subtitle">Upload a TSV file — it will be cleaned, formatted, and ready to download as an Excel (.xlsx) file.</p>

<!-- STEP 1: UPLOAD -->
<div class="card">
  <div class="card-title">Step 1 — Upload TSV file</div>
  <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="upload-icon">&#128196;</div>
    <div class="upload-text"><strong>Click to choose</strong> or drag &amp; drop a .tsv file</div>
    <div class="upload-hint">Tab-separated values (.tsv / .txt)</div>
    <input type="file" id="file-input" accept=".tsv,.txt,.tab">
  </div>
  <div id="file-chosen" class="file-chosen"></div>
  <div id="file-error" class="error"></div>
</div>

<!-- STEP 2: FILTER (VPT only) -->
<div class="card" id="filter-card">
  <div class="card-title">Step 2 — Filter by R Column (VPT only)</div>
  <div class="filter-row">
    <label for="cf-filter">R Column:</label>
    <select id="cf-filter"><option value="">— All —</option></select>
    <button class="btn btn-dark" onclick="applyFilter()">Apply</button>
    <button class="btn" onclick="clearFilter()">Clear</button>
  </div>
  <div class="status-note" id="filter-status"></div>
</div>

<!-- STEP 3: PREVIEW & DOWNLOAD -->
<div class="card" id="output-card">
  <div class="card-title">Step 3 — Preview &amp; Download</div>
  <div class="actions-row">
    <button class="btn btn-dark" onclick="downloadXLSX()">&#11015; Download as Excel (.xlsx)</button>
    <span class="row-count" id="row-count"></span>
  </div>
  <div class="table-wrap">
    <table class="dt">
      <thead id="preview-head"></thead>
      <tbody id="preview-body"></tbody>
    </table>
  </div>
  <div class="status-note" id="preview-note"></div>
</div>

<script>
/* ── State ─────────────────────────────────────────── */
let rawHeaders   = [];
let processedAll = [];   // all processed rows
let filtered     = [];   // current view (after optional filter)
let pageType     = '';

/* ── Column indices (0-based, original TSV) ────────── */
const COL_A  = 0;   // date
const COL_H  = 7;   // staff trainer
const COL_R  = 17;  // quotes extraction
// delete sets (0-based original indices)
const DELETE_COLS = new Set([4,5,6, 9,10,11,12,13,14,15,16, 18,19,20]);

/* ── Upload / Drag-Drop ─────────────────────────────── */
const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

function handleFile(file) {
  clearError();
  document.getElementById('file-chosen').textContent = '📄 ' + file.name;
  const reader = new FileReader();
  reader.onload = e => parseTSV(e.target.result);
  reader.readAsText(file);
}

/* ── Parse & process ───────────────────────────────── */
function parseTSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
  if (lines.length < 2) { showError('File appears empty or has no data rows.'); return; }

  const allRows  = lines.map(l => l.split('\t'));
  rawHeaders     = allRows[0];
  const dataRows = allRows.slice(1);

  // Detect page type from column B (index 1), 5th char
  const sample = dataRows.find(r => r[1] && r[1].length >= 5);
  if (!sample) { showError('Could not read page type from column B (R2). Check file format.'); return; }
  const ch5 = sample[1].charAt(4).toUpperCase();
  pageType = ch5 === 'A' ? 'VPT' : ch5 === 'P' ? 'In-Person' : 'Unknown';

  processedAll = dataRows.map(processRow);
  filtered     = processedAll.slice();

  if (pageType === 'VPT') {
    setupFilter();
    document.getElementById('filter-card').style.display = 'block';
  } else {
    document.getElementById('filter-card').style.display = 'none';
  }

  renderTable(filtered);
  document.getElementById('output-card').style.display = 'block';
}

function processRow(row) {
  const r = row.slice();
  while (r.length < rawHeaders.length) r.push('');

  // A: format date
  r[COL_A] = formatDate(r[COL_A]);

  // H: chars 13-34 (substring 12,34)
  r[COL_H] = (r[COL_H] || '').substring(12, 34).trim();

  // R: text between 3rd and 4th quotation marks
  r[COL_R] = extractBetweenQuotes(r[COL_R] || '', 3, 4);

  // Remove deleted columns
  return r.filter((_, i) => !DELETE_COLS.has(i));
}

function buildFinalHeaders() {
  const kept = rawHeaders.filter((_, i) => !DELETE_COLS.has(i));
  // After deleting 4,5,6 — original col H (idx 7) becomes idx 4 in kept array
  if (kept[4] !== undefined) kept[4] = 'Staff Trainer';
  return kept;
}

/* ── Transformations ────────────────────────────────── */
function formatDate(val) {
  if (!val || !val.trim()) return val;
  const d = new Date(val);
  if (isNaN(d.getTime())) return val;
  const mo  = d.toLocaleString('default', { month: 'short' });
  const dy  = d.getDate();
  const yr  = d.getFullYear();
  let   hr  = d.getHours();
  const mn  = d.getMinutes().toString().padStart(2,'0');
  const ap  = hr >= 12 ? 'PM' : 'AM';
  hr = hr % 12 || 12;
  return `${mo} ${dy}, ${yr} ${hr}:${mn} ${ap}`;
}

function extractBetweenQuotes(str, nStart, nEnd) {
  const re = /['"]/g;
  let m, count = 0, start = -1;
  while ((m = re.exec(str)) !== null) {
    count++;
    if (count === nStart) start = m.index + 1;
    if (count === nEnd && start >= 0) return str.substring(start, m.index);
  }
  return str;
}

/* ── Filter ──────────────────────────────────────────── */
// Original col R = index 17. After deleting cols 4,5,6 (3 cols) and cols 9-16 (8 cols),
// kept order is: 0,1,2,3,7,8,17,... so R lands at final index 6.
const R_FINAL_IDX = 6;

function setupFilter() {
  const vals = [...new Set(processedAll.map(r => (r[R_FINAL_IDX] || '').trim()).filter(Boolean))].sort();
  const sel  = document.getElementById('cf-filter');
  sel.innerHTML = '<option value="">— All —</option>';
  vals.forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = v; sel.appendChild(o);
  });
}

function applyFilter() {
  const val = document.getElementById('cf-filter').value;
  if (!val) { filtered = processedAll.slice(); document.getElementById('filter-status').textContent = ''; }
  else {
    filtered  = processedAll.filter(r => (r[R_FINAL_IDX] || '').trim() === val);
    document.getElementById('filter-status').textContent =
      `Showing ${filtered.length} of ${processedAll.length} rows`;
  }
  renderTable(filtered);
}

function clearFilter() {
  document.getElementById('cf-filter').value = '';
  filtered = processedAll.slice();
  document.getElementById('filter-status').textContent = '';
  renderTable(filtered);
}

/* ── Render preview table ────────────────────────────── */
function renderTable(rows) {
  const hdrs    = buildFinalHeaders();
  const PREVIEW = 300;

  document.getElementById('preview-head').innerHTML =
    '<tr>' + hdrs.map(h => `<th>${esc(h)}</th>`).join('') + '</tr>';

  document.getElementById('preview-body').innerHTML =
    rows.slice(0, PREVIEW).map(r =>
      '<tr>' + hdrs.map((_, i) => `<td>${esc(r[i] !== undefined ? r[i] : '')}</td>`).join('') + '</tr>'
    ).join('');

  document.getElementById('row-count').textContent =
    `${rows.length} row${rows.length !== 1 ? 's' : ''}` +
    (rows.length > PREVIEW ? ` (preview capped at ${PREVIEW}; full data downloads)` : '');

  document.getElementById('preview-note').textContent =
    rows.length > PREVIEW ? `All ${rows.length} rows will be included in the downloaded file.` : '';
}

/* ── Download XLSX ───────────────────────────────────── */
function downloadXLSX() {
  if (!filtered.length) { alert('No data to download.'); return; }

  const hdrs = buildFinalHeaders();
  const wsData = [hdrs, ...filtered.map(r => hdrs.map((_, i) => r[i] !== undefined ? r[i] : ''))];

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(wsData);

  /* Column widths — auto-size based on content */
  const colWidths = hdrs.map((h, ci) => {
    let max = (h || '').length;
    filtered.forEach(r => { const v = r[ci] || ''; if (v.length > max) max = v.length; });
    return { wch: Math.min(Math.max(max + 2, 10), 40) };
  });
  ws['!cols'] = colWidths;

  /* Style header row (row 0) — dark charcoal fill, white bold text, centered */
  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let c = range.s.c; c <= range.e.c; c++) {
    const addr = XLSX.utils.encode_cell({ r: 0, c });
    if (!ws[addr]) continue;
    ws[addr].s = {
      fill:      { fgColor: { rgb: '3A3A3A' } },
      font:      { bold: true, color: { rgb: 'FFFFFF' }, name: 'Calibri', sz: 11 },
      alignment: { horizontal: 'center', vertical: 'center', wrapText: false },
      border:    { bottom: { style: 'thin', color: { rgb: '555555' } } }
    };
  }

  /* Data rows — alternating white / light gray, centered, Calibri */
  for (let r = 1; r <= range.e.r; r++) {
    const isOdd = r % 2 === 1;
    const bg    = isOdd ? 'FFFFFF' : 'F2F2F2';
    for (let c = range.s.c; c <= range.e.c; c++) {
      const addr = XLSX.utils.encode_cell({ r, c });
      if (!ws[addr]) {
        ws[addr] = { v: '', t: 's' };
      }
      ws[addr].s = {
        fill:      { fgColor: { rgb: bg } },
        font:      { name: 'Calibri', sz: 11, color: { rgb: '1A1A1A' } },
        alignment: { horizontal: 'center', vertical: 'center' },
        border: {
          top:    { style: 'thin', color: { rgb: 'D0D0D0' } },
          bottom: { style: 'thin', color: { rgb: 'D0D0D0' } },
          left:   { style: 'thin', color: { rgb: 'D0D0D0' } },
          right:  { style: 'thin', color: { rgb: 'D0D0D0' } }
        }
      };
    }
  }

  /* Freeze top row */
  ws['!freeze'] = { xSplit: 0, ySplit: 1 };

  XLSX.utils.book_append_sheet(wb, ws, 'Formatted Data');

  /* Write with cellStyles enabled */
  XLSX.writeFile(wb, 'formatted_output.xlsx', { bookType: 'xlsx', cellStyles: true });
}

function showError(msg) { document.getElementById('file-error').textContent = msg; }
function clearError()   { document.getElementById('file-error').textContent = ''; }
function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
</script>
</body>
</html>
