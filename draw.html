<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Draw & Send</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #161619;
      --border: #2a2a30;
      --accent: #e8ff47;
      --accent2: #ff4f7b;
      --text: #f0f0ee;
      --muted: #6b6b72;
      --canvas-bg: #1a1a1f;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
    }

    header {
      width: 100%;
      max-width: 860px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
    }
    .logo span { color: var(--accent); }

    .tagline {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .workspace {
      width: 100%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      flex-wrap: wrap;
    }

    .tool-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sep {
      width: 1px;
      height: 28px;
      background: var(--border);
    }

    .tool-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Color swatches */
    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
      position: relative;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active {
      border-color: var(--text);
      transform: scale(1.1);
    }

    /* Custom color input */
    .color-pick-wrap {
      position: relative;
      width: 28px;
      height: 28px;
    }
    .color-pick-wrap input[type=color] {
      opacity: 0;
      position: absolute;
      inset: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .color-pick-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
      border: 2px solid var(--border);
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Brush size slider */
    input[type=range] {
      -webkit-appearance: none;
      width: 80px;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

    /* Tool buttons */
    .tool-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      font-size: 16px;
    }
    .tool-btn:hover { background: var(--border); color: var(--text); }
    .tool-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    /* Canvas */
    .canvas-wrap {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--canvas-bg);
      box-shadow: 0 0 0 1px #ffffff08 inset, 0 24px 60px rgba(0,0,0,0.5);
    }

    #drawCanvas {
      display: block;
      cursor: crosshair;
      touch-action: none;
    }

    .canvas-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: #ffffff14;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.3s;
      user-select: none;
    }

    /* Bottom bar */
    .bottom-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 10px;
      border: none;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .action-btn:hover { transform: translateY(-2px); }
    .action-btn:active { transform: translateY(0); }

    .btn-clear {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-clear:hover { border-color: var(--accent2); color: var(--accent2); }

    .btn-send {
      background: var(--accent);
      color: #000;
      box-shadow: 0 4px 20px rgba(232,255,71,0.25);
    }
    .btn-send:hover { box-shadow: 0 8px 30px rgba(232,255,71,0.4); }
    .btn-send:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 24px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 1000;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s;
      opacity: 0;
      white-space: nowrap;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .toast.success { border-color: var(--accent); }
    .toast.success .toast-icon { color: var(--accent); }
    .toast.error { border-color: var(--accent2); }
    .toast.error .toast-icon { color: var(--accent2); }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      width: 90%;
      max-width: 440px;
      transform: scale(0.92);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal-backdrop.open .modal { transform: scale(1); }

    .modal h2 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .modal-sub {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .email-preview {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .email-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
    }
    .email-row .label { color: var(--muted); min-width: 44px; }
    .email-row .value { color: var(--text); word-break: break-all; }

    .modal-preview-img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      object-fit: contain;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .modal-actions .action-btn { flex: 1; justify-content: center; }

    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-cancel:hover { border-color: var(--border); color: var(--text); }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #00000040;
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">draw<span>&</span>send</div>
  </div>
  <div class="tagline">// sketch → random inbox</div>
</header>

<div class="workspace">

  <!-- Toolbar -->
  <div class="toolbar">
    <span class="tool-label">color</span>
    <div class="tool-group" id="swatches">
      <div class="color-swatch active" data-color="#e8ff47" style="background:#e8ff47"></div>
      <div class="color-swatch" data-color="#ff4f7b" style="background:#ff4f7b"></div>
      <div class="color-swatch" data-color="#47cfff" style="background:#47cfff"></div>
      <div class="color-swatch" data-color="#ff9a3c" style="background:#ff9a3c"></div>
      <div class="color-swatch" data-color="#c47aff" style="background:#c47aff"></div>
      <div class="color-swatch" data-color="#ffffff" style="background:#ffffff"></div>
      <div class="color-pick-wrap" title="Custom color">
        <div class="color-pick-icon">🎨</div>
        <input type="color" id="customColor" value="#e8ff47"/>
      </div>
    </div>

    <div class="sep"></div>
    <span class="tool-label">size</span>
    <input type="range" id="brushSize" min="2" max="40" value="6"/>

    <div class="sep"></div>
    <span class="tool-label">tool</span>
    <div class="tool-group">
      <button class="tool-btn active" id="btnDraw" title="Draw">✏️</button>
      <button class="tool-btn" id="btnErase" title="Eraser">🧹</button>
    </div>

    <div class="sep"></div>
    <span class="tool-label">fill</span>
    <button class="tool-btn" id="btnFill" title="Fill canvas with color">🪣</button>
  </div>

  <!-- Canvas -->
  <div class="canvas-wrap">
    <canvas id="drawCanvas" width="860" height="500"></canvas>
    <div class="canvas-hint" id="hint">your canvas awaits<br/>start drawing ✦</div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <button class="action-btn btn-clear" id="btnClear">🗑 Clear</button>
    <button class="action-btn btn-send" id="btnSend">
      <span>Send to random inbox</span>
      <span>→</span>
    </button>
  </div>

</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h2>Sending your art ✉️</h2>
    <p class="modal-sub">// a stranger is about to receive this</p>
    <div class="email-preview">
      <div class="email-row"><span class="label">to:</span><span class="value" id="modalTo">—</span></div>
      <div class="email-row"><span class="label">from:</span><span class="value">anon@draw-and-send.io</span></div>
      <div class="email-row"><span class="label">subj:</span><span class="value">Someone drew this for you ✦</span></div>
    </div>
    <img class="modal-preview-img" id="modalImg" src="" alt="Your drawing"/>
    <div class="modal-actions">
      <button class="action-btn btn-cancel" id="btnCancel">Cancel</button>
      <button class="action-btn btn-send" id="btnConfirm">
        <span id="confirmLabel">Confirm send</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span class="toast-icon" id="toastIcon">✓</span>
  <span id="toastMsg">Sent!</span>
</div>

<script>
  const canvas = document.getElementById('drawCanvas');
  const ctx = canvas.getContext('2d');
  const hint = document.getElementById('hint');

  // Responsive canvas
  function resizeCanvas() {
    const wrap = canvas.parentElement;
    const w = wrap.offsetWidth;
    const ratio = 500 / 860;
    canvas.style.width = w + 'px';
    canvas.style.height = (w * ratio) + 'px';
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // State
  let drawing = false;
  let tool = 'draw';
  let color = '#e8ff47';
  let brushSize = 6;
  let hasMark = false;

  ctx.fillStyle = '#1a1a1f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const src = e.touches ? e.touches[0] : e;
    return {
      x: (src.clientX - rect.left) * scaleX,
      y: (src.clientY - rect.top) * scaleY
    };
  }

  function startDraw(e) {
    drawing = true;
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    if (!hasMark) {
      hasMark = true;
      hint.style.opacity = '0';
    }
  }

  function draw(e) {
    if (!drawing) return;
    e.preventDefault();
    const pos = getPos(e);
    ctx.lineWidth = brushSize;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    if (tool === 'erase') {
      ctx.strokeStyle = '#1a1a1f';
    } else {
      ctx.strokeStyle = color;
    }
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  }

  function stopDraw() { drawing = false; ctx.beginPath(); }

  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', stopDraw);
  canvas.addEventListener('mouseleave', stopDraw);
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove', draw, { passive: false });
  canvas.addEventListener('touchend', stopDraw);

  // Colors
  document.querySelectorAll('.color-swatch[data-color]').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      color = el.dataset.color;
      tool = 'draw';
      setActiveTool('draw');
    });
  });

  document.getElementById('customColor').addEventListener('input', e => {
    color = e.target.value;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    tool = 'draw';
    setActiveTool('draw');
  });

  // Brush size
  document.getElementById('brushSize').addEventListener('input', e => {
    brushSize = +e.target.value;
  });

  // Tools
  function setActiveTool(t) {
    tool = t;
    document.getElementById('btnDraw').classList.toggle('active', t === 'draw');
    document.getElementById('btnErase').classList.toggle('active', t === 'erase');
  }

  document.getElementById('btnDraw').addEventListener('click', () => setActiveTool('draw'));
  document.getElementById('btnErase').addEventListener('click', () => setActiveTool('erase'));
  document.getElementById('btnFill').addEventListener('click', () => {
    ctx.fillStyle = tool === 'erase' ? '#1a1a1f' : color;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    hasMark = true;
    hint.style.opacity = '0';
  });

  // Clear
  document.getElementById('btnClear').addEventListener('click', () => {
    ctx.fillStyle = '#1a1a1f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    hasMark = false;
    hint.style.opacity = '1';
  });

  // Random email generator
  const names = ['alex','jordan','taylor','morgan','casey','riley','drew','quinn','sage','avery','charlie','blake','skyler','reese','devon','cameron'];
  const domains = ['gmail.com','yahoo.com','outlook.com','protonmail.com','icloud.com','hotmail.com','mail.com'];
  function randomEmail() {
    const n1 = names[Math.floor(Math.random()*names.length)];
    const n2 = names[Math.floor(Math.random()*names.length)];
    const num = Math.floor(Math.random()*9000)+1000;
    const d = domains[Math.floor(Math.random()*domains.length)];
    const patterns = [
      `${n1}.${n2}${num}@${d}`,
      `${n1}_${n2}@${d}`,
      `${n1}${num}@${d}`,
      `the.real.${n1}@${d}`,
      `${n1}.${num}@${d}`,
    ];
    return patterns[Math.floor(Math.random()*patterns.length)];
  }

  // Send flow
  let targetEmail = '';
  document.getElementById('btnSend').addEventListener('click', () => {
    targetEmail = randomEmail();
    document.getElementById('modalTo').textContent = targetEmail;
    const img = document.getElementById('modalImg');
    img.src = canvas.toDataURL('image/png');
    document.getElementById('modal').classList.add('open');
  });

  document.getElementById('btnCancel').addEventListener('click', () => {
    document.getElementById('modal').classList.remove('open');
  });
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) {
      document.getElementById('modal').classList.remove('open');
    }
  });

  document.getElementById('btnConfirm').addEventListener('click', async () => {
    const btn = document.getElementById('btnConfirm');
    const label = document.getElementById('confirmLabel');
    const spinner = document.getElementById('spinner');

    btn.disabled = true;
    label.textContent = 'Sending...';
    spinner.style.display = 'block';

    // Simulate send delay (1.5–2.5s)
    await new Promise(r => setTimeout(r, 1500 + Math.random() * 1000));

    btn.disabled = false;
    label.textContent = 'Confirm send';
    spinner.style.display = 'none';
    document.getElementById('modal').classList.remove('open');

    showToast(`✓ Sent to ${targetEmail}`, 'success');
  });

  // Toast
  function showToast(msg, type = 'success') {
    const toast = document.getElementById('toast');
    const toastMsg = document.getElementById('toastMsg');
    toast.className = 'toast ' + type;
    toastMsg.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
  }
</script>
</body>
</html>
