<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>~ cave ~</title>
<style>
  :root{
    --rock: #241b14;
    --rock-dark: #120c08;
    --ember: #ff7b28;
    --ember-soft: #ffb15e;
    --ash: #6b5d4f;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; overflow:hidden; background:#0a0705; font-family:'Courier New',monospace; }

  #stage{ position:fixed; inset:0; display:flex; }

  /* ---------- CAVE WALL (drawing side) ---------- */
  #wall{
    position:relative; flex:1 1 65%; overflow:hidden; cursor:crosshair;
    background:
      radial-gradient(120% 90% at 50% 115%, rgba(0,0,0,0) 0%, rgba(0,0,0,.55) 60%, rgba(0,0,0,.9) 100%),
      var(--rock);
  }
  /* rocky texture via SVG turbulence */
  #wall::before{
    content:""; position:absolute; inset:-5%;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' seed='7'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
    mix-blend-mode:overlay; opacity:.35; pointer-events:none;
  }
  /* larger rock mottling */
  #wall::after{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:
      radial-gradient(60% 40% at 20% 30%, rgba(0,0,0,.35), transparent 60%),
      radial-gradient(50% 50% at 80% 20%, rgba(0,0,0,.4), transparent 55%),
      radial-gradient(70% 60% at 60% 80%, rgba(0,0,0,.3), transparent 60%);
    mix-blend-mode:multiply;
  }

  /* fire light layer — flickers */
  #firelight{
    position:absolute; inset:0; pointer-events:none; z-index:3; mix-blend-mode:soft-light;
    background:radial-gradient(80% 70% at 50% 108%,
      rgba(255,150,60,.95) 0%, rgba(255,110,40,.6) 25%, rgba(180,60,20,.25) 50%, rgba(0,0,0,0) 75%);
    animation:flicker 220ms infinite alternate ease-in-out;
  }
  #firelight.warm2{ background:radial-gradient(78% 66% at 51% 110%,
      rgba(255,170,80,.9) 0%, rgba(255,90,30,.55) 28%, rgba(150,50,15,.2) 52%, rgba(0,0,0,0) 74%); }
  @keyframes flicker{
    0%{ opacity:.85; transform:translateY(0) scale(1); }
    100%{ opacity:1; transform:translateY(-4px) scale(1.02); }
  }
  /* deep vignette so edges fall into shadow */
  #vignette{ position:absolute; inset:0; pointer-events:none; z-index:4;
    box-shadow:inset 0 0 220px 60px rgba(0,0,0,.85); }

  #paint{ position:absolute; inset:0; z-index:2; touch-action:none; }

  /* embers */
  .ember{ position:absolute; bottom:-10px; width:3px; height:3px; border-radius:50%;
    background:var(--ember-soft); box-shadow:0 0 6px 2px rgba(255,140,50,.7);
    z-index:3; pointer-events:none; opacity:0;
    animation:rise linear infinite; }
  @keyframes rise{
    0%{ transform:translateY(0) translateX(0); opacity:0; }
    10%{ opacity:.9; }
    100%{ transform:translateY(-70vh) translateX(var(--drift)); opacity:0; }
  }

  /* toolbar */
  #tools{ position:absolute; left:14px; top:14px; z-index:6; display:flex; gap:8px; align-items:center;
    padding:8px 10px; background:rgba(10,7,5,.55); border:1px solid rgba(255,140,60,.25);
    border-radius:10px; backdrop-filter:blur(3px); }
  .swatch{ width:22px; height:22px; border-radius:50%; border:2px solid rgba(255,255,255,.15); cursor:pointer; }
  .swatch.sel{ border-color:#fff; box-shadow:0 0 8px rgba(255,180,90,.8); }
  #tools button{ font-family:inherit; font-size:12px; color:var(--ash); background:none;
    border:1px solid rgba(255,140,60,.25); border-radius:6px; padding:5px 8px; cursor:pointer; }
  #tools button:hover{ color:#fff; border-color:rgba(255,140,60,.6); }
  #hint{ position:absolute; left:16px; bottom:14px; z-index:6; color:rgba(255,200,150,.35);
    font-size:12px; letter-spacing:1px; pointer-events:none; }

  /* ---------- SHADOW SIDE (projects) ---------- */
  #shadow{
    flex:0 0 clamp(240px,30%,360px); position:relative; z-index:5;
    background:linear-gradient(90deg, rgba(0,0,0,.55), #0a0705 40%, #08060400);
    background-color:#080604;
    padding:46px 28px; color:#8a7a6a; overflow-y:auto;
    border-left:1px solid rgba(255,120,50,.08);
  }
  #shadow h1{ color:#d9c3a5; font-size:22px; letter-spacing:3px; font-weight:normal; margin-bottom:4px; }
  #shadow .sub{ color:#5c4f43; font-size:12px; letter-spacing:2px; margin-bottom:34px; }
  #shadow h2{ color:#7a6a5a; font-size:11px; letter-spacing:3px; text-transform:uppercase; margin:26px 0 12px; }
  .proj{ display:block; text-decoration:none; padding:12px 0; border-top:1px solid rgba(255,120,50,.06);
    transition:.2s; }
  .proj:hover{ padding-left:8px; }
  .proj .t{ color:#c9b191; font-size:15px; }
  .proj:hover .t{ color:var(--ember-soft); }
  .proj .d{ color:#5c4f43; font-size:12px; margin-top:3px; line-height:1.5; }
  #shadow .foot{ margin-top:38px; color:#3f362d; font-size:11px; letter-spacing:1px; }
  #shadow a.link{ color:#7a6a5a; }
  #shadow a.link:hover{ color:var(--ember-soft); }

  @media (max-width:720px){
    #stage{ flex-direction:column; }
    #wall{ flex:1 1 62%; }
    #shadow{ flex:1 1 38%; padding:24px 20px; }
    #tools{ transform:scale(.92); transform-origin:left top; }
  }
</style>
</head>
<body>
<div id="stage">
  <!-- ============ CAVE WALL ============ -->
  <div id="wall">
    <canvas id="paint"></canvas>
    <div id="firelight"></div>
    <div id="vignette"></div>

    <div id="tools">
      <div class="swatch sel" style="background:#ff6a2a" data-c="#ff6a2a"></div>
      <div class="swatch" style="background:#ffd166" data-c="#ffd166"></div>
      <div class="swatch" style="background:#e8e0d0" data-c="#e8e0d0"></div>
      <div class="swatch" style="background:#7fd1c4" data-c="#7fd1c4"></div>
      <div class="swatch" style="background:#c98bff" data-c="#c98bff"></div>
      <button id="clearMine">erase mine</button>
    </div>
    <div id="hint">drag to spray on the wall · fades in time</div>
  </div>

  <!-- ============ SHADOW SIDE ============ -->
  <aside id="shadow">
    <h1>YOUR&nbsp;NAME</h1>
    <div class="sub">// wanderer · builder · etc</div>

    <h2>Projects</h2>
    <a class="proj" href="#" target="_blank">
      <div class="t">Project One</div>
      <div class="d">One line about what it is and why it exists.</div>
    </a>
    <a class="proj" href="#" target="_blank">
      <div class="t">Project Two</div>
      <div class="d">Short description. Keep it in the shadows.</div>
    </a>
    <a class="proj" href="#" target="_blank">
      <div class="t">Project Three</div>
      <div class="d">Another thing you made.</div>
    </a>

    <h2>Elsewhere</h2>
    <div class="foot">
      <a class="link" href="#" target="_blank">github</a> ·
      <a class="link" href="#" target="_blank">mail</a> ·
      <a class="link" href="#" target="_blank">x</a>
      <br><br>made by firelight
    </div>
  </aside>
</div>

<script>
/* ========================================================================
   CONFIG
   ======================================================================== */
const CONFIG = {
  // How long a doodle lives before it fades away completely (ms).
  doodleLifetimeMs: 2 * 60 * 60 * 1000,   // 2 hours

  // ---- OPTIONAL: shared-across-all-visitors mode ----
  // Leave backendUrl "" to use this browser's local storage (per-visitor).
  // To make doodles SHARED by everyone, see the notes below the code.
  backendUrl: "",        // e.g. "https://api.jsonbin.io/v3/b/XXXXXXXX"
  backendKey: "",        // e.g. your JSONBin X-Master-Key (read+write)
  pollMs: 12000          // how often to fetch others' doodles
};

/* ========================================================================
   SETUP
   ======================================================================== */
const wall  = document.getElementById('wall');
const cv    = document.getElementById('paint');
const ctx   = cv.getContext('2d');
let W, H, DPR = Math.min(2, window.devicePixelRatio || 1);

function resize(){
  const r = wall.getBoundingClientRect();
  W = r.width; H = r.height;
  cv.width = W * DPR; cv.height = H * DPR;
  cv.style.width = W+'px'; cv.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize); resize();

/* doodles are stored NORMALIZED (0..1) so they land right on any screen size.
   each: { id, color, r, pts:[{x,y}...], t (createdAt ms) }                  */
let doodles = loadLocal();

/* ---- color picking ---- */
let color = '#ff6a2a';
document.querySelectorAll('.swatch').forEach(s=>{
  s.addEventListener('click', ()=>{
    document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('sel'));
    s.classList.add('sel'); color = s.dataset.c;
  });
});
document.getElementById('clearMine').addEventListener('click', ()=>{
  const mine = JSON.parse(localStorage.getItem('cave_mine')||'[]');
  doodles = doodles.filter(d=>!mine.includes(d.id));
  localStorage.setItem('cave_mine','[]');
  saveLocal(); pushRemote(null); // best-effort
});

/* ========================================================================
   DRAWING  (spray = overlapping soft radial dots along the path)
   ======================================================================== */
let drawing = false, cur = null, lastEmit = 0;

function pos(e){
  const r = cv.getBoundingClientRect();
  const p = e.touches ? e.touches[0] : e;
  return { x:(p.clientX-r.left)/W, y:(p.clientY-r.top)/H };
}
function start(e){
  drawing = true;
  cur = { id: rid(), color, r: 14, pts:[pos(e)], t: Date.now() };
  e.preventDefault();
}
function move(e){
  if(!drawing) return;
  const p = pos(e);
  const last = cur.pts[cur.pts.length-1];
  // cap total length so doodles stay "short"
  if(cur.pts.length < 220) cur.pts.push(p);
  e.preventDefault();
}
function end(){
  if(!drawing) return;
  drawing = false;
  if(cur && cur.pts.length>1){
    doodles.push(cur);
    const mine = JSON.parse(localStorage.getItem('cave_mine')||'[]');
    mine.push(cur.id); localStorage.setItem('cave_mine', JSON.stringify(mine));
    saveLocal(); pushRemote(cur);
  }
  cur = null;
}
cv.addEventListener('mousedown', start);
cv.addEventListener('mousemove', move);
window.addEventListener('mouseup', end);
cv.addEventListener('touchstart', start, {passive:false});
cv.addEventListener('touchmove', move, {passive:false});
window.addEventListener('touchend', end);

function sprayDot(x,y,c,a,rad){
  const g = ctx.createRadialGradient(x,y,0,x,y,rad);
  g.addColorStop(0, hexA(c, a));
  g.addColorStop(1, hexA(c, 0));
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x,y,rad,0,Math.PI*2); ctx.fill();
}
function drawDoodle(d){
  const age = Date.now() - d.t;
  const life = CONFIG.doodleLifetimeMs;
  if(age > life) return false;
  let a = 0.9;
  if(age < 900) a *= age/900;                 // quick fade-in
  a *= 1 - (age/life)*(age/life);             // slow fade-out
  a = Math.max(0, a);
  const rad = d.r;
  const pts = d.pts;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i], p1=pts[i+1];
    const dx=(p1.x-p0.x)*W, dy=(p1.y-p0.y)*H;
    const dist=Math.hypot(dx,dy);
    const steps=Math.max(1, Math.floor(dist/4));
    for(let s=0;s<=steps;s++){
      const x=(p0.x*W)+dx*(s/steps), y=(p0.y*H)+dy*(s/steps);
      sprayDot(x,y,d.color,a*0.14,rad);
    }
  }
  return true;
}

/* render loop */
function render(){
  ctx.clearRect(0,0,W,H);
  ctx.globalCompositeOperation = 'lighter';   // paint glows against rock
  doodles = doodles.filter(drawDoodle);
  if(drawing && cur) drawDoodle(cur);
  ctx.globalCompositeOperation = 'source-over';
  requestAnimationFrame(render);
}
render();

/* prune + occasional save */
setInterval(()=>{
  const before = doodles.length;
  doodles = doodles.filter(d => Date.now()-d.t < CONFIG.doodleLifetimeMs);
  if(doodles.length!==before) saveLocal();
}, 30000);

/* ========================================================================
   STORAGE
   ======================================================================== */
function saveLocal(){
  try{ localStorage.setItem('cave_doodles', JSON.stringify(doodles)); }catch(e){}
}
function loadLocal(){
  try{
    const raw = JSON.parse(localStorage.getItem('cave_doodles')||'[]');
    return raw.filter(d => Date.now()-d.t < CONFIG.doodleLifetimeMs);
  }catch(e){ return []; }
}

/* -------- OPTIONAL shared backend (JSONBin-style) -------- */
async function pullRemote(){
  if(!CONFIG.backendUrl) return;
  try{
    const res = await fetch(CONFIG.backendUrl+'/latest', {
      headers: CONFIG.backendKey ? {'X-Master-Key':CONFIG.backendKey}:{}
    });
    const json = await res.json();
    const arr = (json.record && json.record.doodles) || json.doodles || [];
    const fresh = arr.filter(d => Date.now()-d.t < CONFIG.doodleLifetimeMs);
    // merge by id
    const seen = new Set(doodles.map(d=>d.id));
    fresh.forEach(d=>{ if(!seen.has(d.id)) doodles.push(d); });
  }catch(e){ /* offline / not configured */ }
}
let pushTimer=null;
async function pushRemote(){
  if(!CONFIG.backendUrl) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(async ()=>{
    try{
      const payload = { doodles: doodles.filter(d=>Date.now()-d.t<CONFIG.doodleLifetimeMs) };
      await fetch(CONFIG.backendUrl, {
        method:'PUT',
        headers:Object.assign({'Content-Type':'application/json'},
          CONFIG.backendKey?{'X-Master-Key':CONFIG.backendKey}:{}),
        body: JSON.stringify(payload)
      });
    }catch(e){}
  }, 400);
}
if(CONFIG.backendUrl){ pullRemote(); setInterval(pullRemote, CONFIG.pollMs); }

/* ========================================================================
   EMBERS + FIRE FLICKER
   ======================================================================== */
const fl = document.getElementById('firelight');
setInterval(()=>{ fl.classList.toggle('warm2', Math.random()>.5); }, 130);

function spawnEmber(){
  const e = document.createElement('div');
  e.className='ember';
  e.style.left = (35 + Math.random()*30) + '%';
  e.style.setProperty('--drift', (Math.random()*80-40)+'px');
  e.style.animationDuration = (3.5 + Math.random()*3)+'s';
  e.style.width = e.style.height = (2+Math.random()*2)+'px';
  wall.appendChild(e);
  setTimeout(()=>e.remove(), 7000);
}
setInterval(spawnEmber, 380);

/* helpers */
function rid(){ return Math.random().toString(36).slice(2,10)+Date.now().toString(36); }
function hexA(hex,a){
  const n=parseInt(hex.slice(1),16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}
</script>
</body>
</html>
